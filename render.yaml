services:
  - type: web
    name: helpfulwebtools-api
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r backend/requirements.prod.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: REMOVE_BG_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
